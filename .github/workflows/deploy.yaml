name: swiswim deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install poetry
          poetry install

      - name: Run tests
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5433
          DB_USER: test
          DB_PASSWORD: test
          DB_NAME: test
          JWT_SECRET_KEY: secret_key_for_tests_1
          JWT_ALGORITHM: HS256
        run: poetry run pytest

  deploy-preprod:
    runs-on: ubuntu-latest
    needs: test
    if: always() && github.ref == 'refs/heads/preprod'

    steps:
      - name: Deploy via SSH to Preprod instance
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/swiswim
            git fetch origin main
            git reset --hard origin/main
            docker compose --env-file ./backend/.env up -d --build
            
  deploy-prod:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Prod instance
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            cd /opt/swiswim
            git fetch origin main
            git reset --hard origin/main
            docker compose --env-file ./backend/.env up -d --build
